services:
  - type: web
    name: almacenando-api
    runtime: node
    region: oregon
    plan: free
    healthCheckPath: /api/healthz
    previousRetainDeploymentCount: 2
    rollback:
      enabled: true

    # -----------------------------------------------------------------------
    # Build Command
    # -----------------------------------------------------------------------
    buildCommand: >
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @workspace/api-server build &&
      pnpm --filter @workspace/legado build &&
      pnpm --filter @workspace/db migrate

    startCommand: node artifacts/api-server/dist/index.cjs

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # PostgreSQL Internal URL del dashboard de Render

      # ⚠️ CRITICO: USA sync:false Y PON UN VALOR FIJO EN EL DASHBOARD
      # Si usas generateValue:true, Render cambia el secret en cada deploy
      # y bota a todos los usuarios de sesión. Genera uno con:
      # node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
      - key: SESSION_SECRET
        sync: false

      - key: APP_URL
        sync: false          # Ej: https://almacenando.onrender.com

      - key: LOG_LEVEL
        value: info

      # Email corporativo Gmail (SMTP)
      - key: EMAIL_USER
        sync: false          # Ej: almacen@tuempresa.com
      - key: SMTP_APP_PASSWORD
        sync: false          # App Password de Google

      # Google Drive
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false          # JSON completo de la cuenta de servicio
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false          # ID de la carpeta en Drive

      # Cloudinary (opcional)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
